services:
  # ── The Agent Swarm ──
  swarm:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ATTENA_BASE_URL=https://attena-api.fly.dev/api/search/
      - ATTENA_API_KEY=${ATTENA_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - KALSHI_EMAIL=${KALSHI_EMAIL:-}
      - KALSHI_PASSWORD=${KALSHI_PASSWORD:-}
      - POLYMARKET_PRIVATE_KEY=${POLYMARKET_PRIVATE_KEY:-}
      - POSTGRES_DSN=postgres://swarm:swarm@postgres:5432/agentswarm?sslmode=disable
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      - HTTP_PORT=8080
      - POLL_INTERVAL=30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    restart: unless-stopped

  # ── PostgreSQL — Trade history & market snapshots ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm
      POSTGRES_DB: agentswarm
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis — Real-time state & pub/sub ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ── NATS — Inter-agent messaging ──
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"  # monitoring
    command: ["--js"]  # enable JetStream

volumes:
  pgdata:
  redisdata:
